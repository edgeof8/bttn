<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bttn — install</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
      text-align: center;
    }

    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; }

    p {
      color: #8b949e;
      font-size: 1.05rem;
      max-width: 440px;
      line-height: 1.6;
    }

    .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8b949e;
    }

    .bookmarklet {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: #238636;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid #2ea043;
      cursor: grab;
      user-select: none;
      transition: background 0.15s, transform 0.1s;
    }

    .bookmarklet:hover { background: #2ea043; }
    .bookmarklet:active { cursor: grabbing; transform: scale(0.97); }

    .arrow {
      font-size: 1.5rem;
      animation: bounce 1.4s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .bookmarks-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .bookmarks-bar span { color: #e6edf3; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 340px;
      color: #8b949e;
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid #30363d;
    }

    .copy-btn {
      padding: 0.6rem 1.4rem;
      background: transparent;
      color: #8b949e;
      font-size: 0.9rem;
      border-radius: 8px;
      border: 1px solid #30363d;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: #e6edf3; border-color: #8b949e; }
    .copy-btn.copied { color: #3fb950; border-color: #3fb950; }

    .manual { font-size: 0.85rem; color: #8b949e; }
    .manual a { color: #58a6ff; text-decoration: none; }
    .manual a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>bttn</h1>
  <p>One bookmarklet. Your full AI conversation on the clipboard as clean Markdown.</p>

  <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
    <div class="label">drag this to your bookmarks bar</div>
    <div class="arrow">&#8595;</div>
    <a id="bttn" class="bookmarklet" href="#">bttn</a>
    <div class="bookmarks-bar">&#128278; Bookmarks bar &nbsp;|&nbsp; <span>bttn</span></div>
  </div>

  <div class="divider">can't drag?</div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem">
    <button class="copy-btn" id="copy-btn">Copy code — paste as bookmark URL</button>
  </div>

  <p class="manual">
    See the <a href="https://github.com/edgeof8/bttn#install-10-seconds">README</a> for manual install instructions.
  </p>

  <!-- bookmarklet source — single source of truth for both drag and copy -->
  <script id="bttn-code" type="text/plain">javascript:(async()=>{const SEP="\n\n---\n\n";const h=location.hostname;let out="";function nodeToMd(el){let t="";el.childNodes.forEach(n=>{if(n.nodeType===3){t+=n.textContent;return;}if(n.nodeType!==1)return;const tag=n.tagName;if(n.closest('[data-testid="thought-block"],.thoughts-container,.model-thoughts,.thinking-container,.o1-thinking,[class*="thought"]'))return;if(tag==="BR"){t+="\n";return;}if(tag==="A"){t+=" "+nodeToMd(n).trim()+" ";return;}if(tag==="PRE"){const code=n.querySelector("code");const lang=(code?.className||"").match(/language-(\w+)/)?.[1]||"";t+="\n```"+lang+"\n"+(code||n).innerText.trim()+"\n```\n";return;}if(tag==="CODE"&&n.parentElement?.tagName!=="PRE"){t+="`"+n.innerText+"`";return;}if(tag==="STRONG"||tag==="B"){t+="**"+nodeToMd(n)+"**";return;}if(tag==="EM"||tag==="I"){t+="*"+nodeToMd(n)+"*";return;}if(["H1","H2","H3","H4"].includes(tag)){const lvl="#".repeat(parseInt(tag[1]));t+="\n"+lvl+" "+nodeToMd(n).trim()+"\n";return;}if(tag==="LI"){t+="\n- "+nodeToMd(n).trim();return;}if(tag==="UL"||tag==="OL"){t+="\n"+nodeToMd(n)+"\n";return;}if(["P","DIV","TR","SECTION"].includes(tag)){const inner=nodeToMd(n).trim();if(inner)t+="\n"+inner+"\n";return;}t+=nodeToMd(n);});return t;}function clean(txt){return txt.replace(/\n{3,}/g,"\n\n").replace(/\s{2,}/g," ").trim();}function isGhost(txt){return /^\s*(Human|Model|Assistant|User|Claude|Grok)?\s*\d*:?\d*\s*(AM|PM)?\s*$/i.test(txt.trim());}function extract(el){const cl=el.cloneNode(true);cl.querySelectorAll('.thinking-container,.thoughts-container,.model-thoughts,[class*="thought"],[class*="expand"],.mat-expansion-panel,[data-testid="thought-block"],[data-testid*="thinking"]').forEach(e=>e.remove());return clean(nodeToMd(cl));}const platformHandlers={claude:{match:()=>h.includes("claude.ai"),run:()=>{document.querySelectorAll('[data-test-render-count]').forEach(t=>{const u=t.querySelector('[data-testid="user-message"]');const a=t.querySelector('.font-claude-response,[data-testid="assistant-message"]');if(u){const txt=extract(u);if(txt&&!isGhost(txt))out+="**Human**\n\n"+txt+SEP;}if(a){const txt=extract(a);if(txt&&!isGhost(txt))out+="**Claude**\n\n"+txt+SEP;}});}},aistudio:{match:()=>h.includes("aistudio.google"),run:async()=>{const sc=document.querySelector('[data-autoscroll-container]')||document.documentElement;const sv=sc.scrollTop;sc.scrollTop=0;await new Promise(r=>setTimeout(r,500));const mc=document.querySelector('ms-prompt-editor .view-lines');if(mc){const t=mc.innerText.trim();if(t)out+="**Initial Prompt**\n\n"+t+SEP;}sc.scrollTop=sv;document.querySelectorAll('ms-chat-turn').forEach(t=>{const isUser=!!t.querySelector('.user-prompt-container');const tc=t.querySelector('.turn-content');if(tc){let txt=extract(tc).replace(/^(Human|Model)\s+\d+:\d+\s*(AM|PM)?\s*\n?/i,'').trim();if(txt&&!isGhost(txt))out+=`**${isUser?'Human':'Model'}**\n\n${txt}${SEP}`;}});}},chatgpt:{match:()=>h.includes("chatgpt.com")||h.includes("chat.openai"),run:()=>{document.querySelectorAll('div[data-message-author-role]').forEach(m=>{const role=m.getAttribute('data-message-author-role');const txt=extract(m);if(txt&&!isGhost(txt))out+=`**${role==='user'?'Human':'Assistant'}**\n\n${txt}${SEP}`;});}},grok:{match:()=>h.includes("grok.com")||h.includes("x.com"),run:()=>{document.querySelectorAll('[data-testid="user-message"],[data-testid="assistant-message"]').forEach(m=>{const isUser=m.getAttribute('data-testid')==='user-message';const txt=extract(m);if(txt&&!isGhost(txt))out+=`**${isUser?'Human':'Grok'}**\n\n${txt}${SEP}`;});}}};let handled=false;for(const[,handler]of Object.entries(platformHandlers)){if(handler.match()){await handler.run();handled=true;break;}}if(!handled){const msgs=document.querySelectorAll('[data-message-author-role],[data-testid*="message"],[data-testid*="turn"],.prose,.markdown,article[role="article"],div[role="article"],.chat-message,.message,.conversation-turn');if(msgs.length>0){msgs.forEach(m=>{const role=m.getAttribute('data-message-author-role')||m.getAttribute('data-testid')||'';const txt=extract(m);if(txt&&!isGhost(txt)){const label=role.includes('user')||role.includes('human')?'Human':(role.includes('assistant')||role.includes('model')||role.includes('claude')||role.includes('grok'))?'Assistant':'Message';out+=`**${label}**\n\n${txt}${SEP}`;}})}else{out=clean(document.body.innerText);}}out=out.replace(/---\s*$/,'').trim();const t=document.title;if(out){await navigator.clipboard.writeText(out);document.title="✓ Copied";}else{document.title="Nothing to copy";}setTimeout(()=>document.title=t,1500);})();</script>

  <script>
    const code = document.getElementById('bttn-code').textContent.trim();
    document.getElementById('bttn').href = code;

    document.getElementById('copy-btn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy code — paste as bookmark URL';
        btn.classList.remove('copied');
      }, 1500);
    });
  </script>

</body>
</html>
