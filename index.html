<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bttn — copy AI chats as Markdown</title>
  <meta name="description" content="One bookmarklet. Copies your full AI conversation to the clipboard as clean Markdown. Works with Claude, ChatGPT, Grok, and AI Studio.">
  <meta property="og:title" content="bttn — copy AI chats as Markdown">
  <meta property="og:description" content="One bookmarklet. Copies your full AI conversation to the clipboard as clean Markdown.">
  <meta property="og:url" content="https://edgeof8.github.io/bttn/">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      padding: 4rem 2rem 5rem;
      text-align: center;
    }

    /* ── Hero ──────────────────────────────────────────────── */

    .hero { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

    .brand {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #3fb950;
      text-shadow: 0 0 60px rgba(63, 185, 80, 0.35);
    }

    .tagline {
      font-size: 1.2rem;
      font-weight: 500;
      color: #e6edf3;
      max-width: 480px;
      line-height: 1.5;
    }

    .sub-tagline {
      color: #6e7681;
      font-size: 0.92rem;
    }

    /* ── Platform badges ───────────────────────────────────── */

    .platforms {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.3rem 0.8rem;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid;
      letter-spacing: 0.01em;
    }

    .platform-badge.claude   { color: #d97706; border-color: rgba(217,119,6,0.6);   background: rgba(217,119,6,0.08); }
    .platform-badge.chatgpt  { color: #10a37f; border-color: rgba(16,163,127,0.6);  background: rgba(16,163,127,0.08); }
    .platform-badge.grok     { color: #a78bfa; border-color: rgba(167,139,250,0.6); background: rgba(167,139,250,0.08); }
    .platform-badge.aistudio { color: #60a5fa; border-color: rgba(96,165,250,0.6);  background: rgba(96,165,250,0.08); }

    /* ── Before / After ────────────────────────────────────── */

    .ba-section {
      width: 100%;
      max-width: 820px;
      text-align: left;
    }

    .ba-eyebrow {
      text-align: center;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #484f58;
      margin-bottom: 1.25rem;
    }

    .ba-grid {
      display: grid;
      grid-template-columns: 1fr 3rem 1fr;
      align-items: stretch;
    }

    .ba-panel {
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .ba-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.85rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .before-header { color: #6e7681; }
    .after-header  { color: #3fb950; }

    .ba-panel-header .pill {
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
    }

    .before-header .pill { background: rgba(248,81,73,0.15); color: #f85149; }
    .after-header  .pill { background: rgba(63,185,80,0.15);  color: #3fb950; }

    .ba-content {
      padding: 1rem;
      font-family: "SF Mono", "Cascadia Code", "Fira Mono", monospace;
      font-size: 0.73rem;
      line-height: 1.7;
      background: #0d1117;
      flex: 1;
    }

    /* Before panel — chat UI noise */
    .chat-turn   { margin-bottom: 0.85rem; }
    .chat-meta   { margin-bottom: 0.3rem; }
    .chat-name   { font-weight: 700; color: #e6edf3; font-family: -apple-system, sans-serif; font-size: 0.78rem; }
    .chat-time   { color: #484f58; font-size: 0.68rem; margin-left: 0.4rem; font-family: -apple-system, sans-serif; }
    .chat-text   { color: #8b949e; }
    .chat-pre    {
      background: #161b22; border: 1px solid #30363d; border-radius: 5px;
      padding: 0.55rem 0.7rem; color: #79c0ff; margin: 0.4rem 0;
      white-space: pre; overflow: hidden;
    }
    .chat-btns   { margin: 0.25rem 0 0.4rem; }
    .chat-btn    {
      display: inline-block; background: #21262d; border: 1px solid #30363d;
      border-radius: 4px; padding: 0.12rem 0.5rem; font-size: 0.65rem;
      color: #6e7681; margin-right: 0.3rem;
      font-family: -apple-system, sans-serif;
    }

    /* After panel — clean Markdown */
    .md-turn  { margin-bottom: 0.6rem; }
    .md-bold  { color: #e6edf3; font-weight: 700; }
    .md-text  { color: #8b949e; }
    .md-sep   { color: #30363d; margin: 0.5rem 0; }
    .md-pre   {
      background: #161b22; border: 1px solid #30363d; border-radius: 5px;
      padding: 0.55rem 0.7rem; color: #79c0ff; margin: 0.4rem 0;
      white-space: pre; overflow: hidden;
    }
    .md-lang  { color: #6e7681; }

    /* Arrow between panels */
    .ba-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3fb950;
      font-size: 1.3rem;
    }

    @media (max-width: 620px) {
      .ba-grid {
        grid-template-columns: 1fr;
      }
      .ba-arrow {
        padding: 0.25rem 0;
        transform: rotate(90deg);
      }
    }

    /* ── Install ───────────────────────────────────────────── */

    .install {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6e7681;
    }

    .bookmarklet {
      display: inline-block;
      padding: 0.85rem 2.25rem;
      background: #238636;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid #2ea043;
      cursor: grab;
      user-select: none;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .bookmarklet:hover {
      background: #2ea043;
      box-shadow: 0 0 28px rgba(46, 160, 67, 0.4);
    }

    .bookmarklet:active { cursor: grabbing; transform: scale(0.97); }

    .drag-hint { font-size: 0.78rem; color: #484f58; margin-top: -0.25rem; }

    .arrow {
      font-size: 1.4rem;
      animation: bounce 1.4s ease-in-out infinite;
      color: #484f58;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .bookmarks-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.45rem 1rem;
      font-size: 0.82rem;
      color: #484f58;
    }

    .bookmarks-bar .slot {
      color: #e6edf3;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 0.15rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ── Divider / copy fallback ───────────────────────────── */

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
      color: #484f58;
      font-size: 0.78rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid #21262d;
    }

    .copy-btn {
      padding: 0.55rem 1.25rem;
      background: transparent;
      color: #8b949e;
      font-size: 0.88rem;
      border-radius: 8px;
      border: 1px solid #30363d;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .copy-btn:hover { color: #e6edf3; border-color: #8b949e; }
    .copy-btn.copied { color: #3fb950; border-color: #3fb950; }

    /* ── Footer ────────────────────────────────────────────── */

    .footer { font-size: 0.82rem; color: #484f58; }
    .footer a { color: #58a6ff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <div class="brand">bttn</div>
    <p class="tagline">Copy any AI conversation to your clipboard as clean&nbsp;Markdown.</p>
    <p class="sub-tagline">One click.</p>
  </div>

  <!-- Platform badges -->
  <div class="platforms">
    <span class="platform-badge claude">Claude</span>
    <span class="platform-badge chatgpt">ChatGPT</span>
    <span class="platform-badge grok">Grok</span>
    <span class="platform-badge aistudio">AI Studio</span>
  </div>

  <!-- Install -->
  <div class="install">
    <div class="label">drag this to your bookmarks bar</div>
    <a id="bttn" class="bookmarklet" href="#">bttn</a>
    <div class="arrow">&#8595;</div>
    <div class="bookmarks-bar">
      &#128278; Bookmarks &nbsp;&nbsp; <span class="slot">bttn</span> &nbsp;&nbsp; &#183;&#183;&#183;
    </div>
    <div class="drag-hint">then visit any AI chat and click it</div>
  </div>

  <div class="divider">can't drag?</div>

  <button class="copy-btn" id="copy-btn">Copy code — paste as bookmark URL</button>

  <p class="footer">
    <a href="https://github.com/edgeof8/bttn">GitHub</a>
  </p>

  <!-- loader — single source of truth for both drag and copy; fetches bttn.js fresh each click -->
  <script id="bttn-code" type="text/plain">javascript:(function(){var s=document.createElement('script');s.src='https://edgeof8.github.io/bttn/bttn.js?v='+Date.now();document.body.appendChild(s);})();</script>

  <script>
    const code = document.getElementById('bttn-code').textContent.trim();
    document.getElementById('bttn').href = code;

    document.getElementById('copy-btn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(code);
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy code — paste as bookmark URL';
        btn.classList.remove('copied');
      }, 1500);
    });
  </script>

</body>
</html>
